<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser Tests</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe6;
      --panel: #fffaf2;
      --text: #1f1f1f;
      --muted: #675f55;
      --border: #d5c7b8;
      --pass: #1d7a43;
      --fail: #b53030;
      --shadow: 0 18px 40px rgba(73, 52, 27, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 32px 16px;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.85), transparent 35%),
        linear-gradient(180deg, #efe2cd 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    main {
      width: min(900px, 100%);
      margin: 0 auto;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    #summary {
      margin-bottom: 20px;
      font-weight: 600;
    }

    .results {
      display: grid;
      gap: 12px;
    }

    .result {
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-left-width: 6px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.7);
    }

    .result.pass {
      border-left-color: var(--pass);
    }

    .result.fail {
      border-left-color: var(--fail);
    }

    .result-title {
      font-weight: 700;
    }

    .result-message {
      margin-top: 6px;
      color: var(--muted);
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main>
    <h1>Browser Test Suite</h1>
    <p>Open this page through a local HTTP server to run isolated tests for project modules without external libraries.</p>
    <div id="summary">Running tests...</div>
    <section class="results" id="results"></section>
  </main>

  <script type="module">
    import { renderTestResults } from "./tests.js";
    import { runEventMessageBusTests } from "./event-message-bus.tests.js";

    const summary = document.getElementById("summary");
    const resultsRoot = document.getElementById("results");
    const results = [
      ...runEventMessageBusTests(),
    ];

    renderTestResults({
      summaryElement: summary,
      resultsElement: resultsRoot,
      results,
    });
  </script>
</body>
</html>
