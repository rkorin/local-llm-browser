<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser Tests</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe6;
      --panel: #fffaf2;
      --text: #1f1f1f;
      --muted: #675f55;
      --border: #d5c7b8;
      --pass: #1d7a43;
      --fail: #b53030;
      --shadow: 0 18px 40px rgba(73, 52, 27, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 32px 16px;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.85), transparent 35%),
        linear-gradient(180deg, #efe2cd 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    main {
      width: min(900px, 100%);
      margin: 0 auto;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    #summary {
      margin-bottom: 20px;
      font-weight: 600;
    }

    .summary-total {
      font-size: 1.05rem;
    }

    .summary-suite {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .results {
      display: grid;
      gap: 12px;
    }

    .result {
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-left-width: 6px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.7);
    }

    .result.pass {
      border-left-color: var(--pass);
    }

    .result.fail {
      border-left-color: var(--fail);
    }

    .result-title {
      font-weight: 700;
    }

    .result-message {
      margin-top: 6px;
      color: var(--muted);
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main>
    <h1>Browser Test Suite</h1>
    <p>Open this page through a local HTTP server to run isolated tests for project modules without external libraries.</p>
    <div id="summary">Running tests...</div>
    <section class="results" id="results"></section>
  </main>

  <script type="module">
    import { renderTestResults } from "./tests.js";
    import { runDebugPanelPresenterTests } from "./presenter-debug-panel.tests.js";
    import { runEventMessageBusTests } from "./event-message-bus.tests.js";
    import { runGamePresenterTests } from "./presenter-game.tests.js";
    import { runMainPresenterTests } from "./presenter-main.tests.js";
    import { runPresenterBaseTests } from "./presenter-base.tests.js";
    import { runProviderEchoTests } from "./provider-echo.tests.js";
    import { runProviderFactoryTests } from "./provider-factory.tests.js";
    import { runProviderLocalLlmTests } from "./provider-local-llm.tests.js";
    import { runResourceFactoryTests } from "./resource-factory.tests.js";
    import { runTreeRepositoryTests } from "./repository-tree.tests.js";
    import { runBootstrapStateMachineTests } from "./state-machine-bootstrap.tests.js";
    import { runGameStateMachineTests } from "./state-machine-game.tests.js";
    import { runStateMachineTests } from "./state-machine.tests.js";

    const summary = document.getElementById("summary");
    const resultsRoot = document.getElementById("results");
    const suiteEntries = [
      { name: "event-message-bus", run: runEventMessageBusTests },
      { name: "resource-factory", run: runResourceFactoryTests },
      { name: "tree-repository", run: runTreeRepositoryTests },
      { name: "presenter-base", run: runPresenterBaseTests },
      { name: "presenter-main", run: runMainPresenterTests },
      { name: "presenter-game", run: runGamePresenterTests },
      { name: "presenter-debug-panel", run: runDebugPanelPresenterTests },
      { name: "state-machine", run: runStateMachineTests },
      { name: "state-machine-bootstrap", run: runBootstrapStateMachineTests },
      { name: "state-machine-game", run: runGameStateMachineTests },
      { name: "provider-echo", run: runProviderEchoTests },
      { name: "provider-local-llm", run: runProviderLocalLlmTests },
      { name: "provider-factory", run: runProviderFactoryTests },
    ];

    async function main() {
      const suites = [];

      for (const suiteEntry of suiteEntries) {
        console.group(`[SUITE START] ${suiteEntry.name}`);
        const testExecutors = suiteEntry.run();
        const suiteResults = [];

        for (const executeTest of testExecutors) {
          suiteResults.push(await executeTest());
        }

        suites.push({
          name: suiteEntry.name,
          results: suiteResults,
        });
        console.info(`[SUITE END] ${suiteEntry.name}`, suiteResults);
        console.groupEnd();
      }

      const results = suites.flatMap((suite) => suite.results);

      renderTestResults({
        summaryElement: summary,
        resultsElement: resultsRoot,
        results,
        suites,
      });
    }

    main().catch((error) => {
      console.error("[TEST RUNNER FATAL]", error);
      summary.textContent = `Test runner failed: ${error instanceof Error ? error.message : String(error)}`;
      resultsRoot.replaceChildren();
    });
  </script>
</body>
</html>
