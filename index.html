<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser LLM Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main id="app-root">
    <h1 id="page-title">Browser LLM Demo</h1>
    <p id="page-description">
      Minimal browser-only skeleton for loading a remote WebLLM model and starting a tiny yes/no guessing game.
    </p>
    <div class="toolbar">
      <label class="language-switcher">
        <span id="language-label">Language</span>
        <select id="language-select">
          <option value="en">English</option>
          <option value="de">Deutsch</option>
        </select>
      </label>
    </div>

    <section class="panel">
      <h2 id="status-title">Status</h2>
      <div class="progress-shell" aria-hidden="true">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="status" id="status-text">Waiting to start...</div>
      <div class="status-actions">
        <button type="button" class="debug-toggle hidden" id="start-game-button">Start Game</button>
        <!-- Intentionally hidden until the independent all-events debug observer is enabled. -->
        <button type="button" class="debug-toggle hidden" id="debug-toggle-button">Debug</button>

      </div>
      <section class="debug-panel hidden" id="debug-panel">
        <h3 id="debug-title">Last Model Call</h3>
        <div class="debug-grid">
          <div>
            <div class="debug-label" id="debug-stage-label">Stage</div>
            <pre class="debug-pre" id="debug-stage">No model call yet.</pre>
          </div>
          <div>
            <div class="debug-label" id="debug-prompt-label">Prompt</div>
            <textarea class="debug-textarea" id="debug-prompt-input" spellcheck="false">No prompt yet.</textarea>
            <div class="debug-actions">
              <button type="button" class="debug-toggle" id="rerun-prompt-button">Send Again</button>
            </div>
          </div>
          <div>
            <div class="debug-label" id="debug-response-label">Raw Response</div>
            <pre class="debug-pre" id="debug-response">No response yet.</pre>
          </div>
        </div>
      </section>
    </section>

    <section class="panel hidden" id="game-panel">
      <h2 id="game-title">Game</h2>
      <div class="chat-log" id="chat-log"></div>
      <div class="choice-row hidden" id="choice-row">
        <button type="button" id="yes-button">Yes</button>
        <button type="button" id="no-button">No</button>
      </div>
      <div class="input-row hidden" id="input-row">
        <input type="text" id="animal-input" placeholder="Type the animal name in English" />
        <button type="button" id="submit-animal-button">Save</button>
      </div>
      <div class="choice-row restart hidden" id="restart-row">
        <button type="button" class="restart-button" id="restart-button">Let's play again</button>
        <button type="button" class="debug-toggle danger-button" id="close-game-button">Close Game</button>
      </div>
    </section>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
